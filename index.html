<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>準備中 — worldcup-rb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0b10; --card:#15151d; --line:#2a2a37; --tx:#f4efe6; --muted:#9b96a0;
    --g-hi:#f3dca0; --g-mid:#d4af7c; --g-lo:#9c7b46;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 50% -10%,rgba(212,175,124,.10),transparent 60%),var(--bg);
    color:var(--tx); font-family:"Noto Sans JP",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100dvh; padding:24px; text-align:center;
  }
  .wrap{max-width:560px}
  .kicker{font-size:12px;letter-spacing:.34em;color:var(--g-mid);font-weight:800;text-transform:uppercase;margin-bottom:14px}
  h1{
    font-family:"Anton",sans-serif; font-weight:400; line-height:1.02; margin:0 0 10px;
    font-size:clamp(40px,12vw,76px); letter-spacing:.02em;
    background:linear-gradient(180deg,var(--g-hi),var(--g-mid) 55%,var(--g-lo));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sub{font-size:clamp(15px,4.5vw,19px); font-weight:600; margin:0 0 8px}
  .note{color:var(--muted); font-size:13px; line-height:1.9; margin:18px auto 0; max-width:420px}
  .chip{display:inline-block;margin-top:22px;border:1px solid var(--line);background:var(--card);
    border-radius:999px;padding:8px 16px;font-size:12.5px;color:var(--muted)}
  .chip b{color:var(--g-hi);font-weight:700}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--g-mid);margin-right:7px;
    vertical-align:1px;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
</style>
</head>
<body>
  <main class="wrap">
    <div class="kicker">Coming Soon</div>
    <h1>準備中</h1>
    <p class="sub">このページは現在準備中です。</p>
    <p class="note">新しい予想ゲームのダッシュボードをここに公開予定です。<br>もうしばらくお待ちください。</p>
    <span class="chip"><span class="dot"></span>kentar00.github.io/<b>worldcup-rb</b></span>
  </main>
</body>
</html>
