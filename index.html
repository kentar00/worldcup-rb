<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W杯 4カ国順位予想ゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --tx:#f3f3f8;--muted:#8a8aa0;
    --bg:#0a0a10;--panel:#14141e;--panel2:#1b1b28;
    --violet:#7c3aed;--violetL:#a78bfa;--lime:#c6ff00;--pink:#ff3d81;--blue:#00d4ff;--orange:#ff8a00;
    --g-hi:#d6ff4d;--g-mid:#c6ff00;--g-lo:#a9d900;
    --gold:#c6ff00;--gold-soft:#a9d900;
    --card:#14141e;--line:#262636;--row:#1b1b28;
    --c1:#ff3d81;--c2:#ff8a00;--c3:#ffd60a;--c4:#27e07a;--c5:#00d4ff;--c6:#3d7bff;--c7:#a855f7;--c8:#ff52c0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Space Grotesk","Noto Sans JP",sans-serif;color:var(--tx);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;background:var(--bg)}
  ::selection{background:var(--lime);color:#0a0a10}
  .gold-text{background:linear-gradient(135deg,var(--lime),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px 90px}

  header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:22px 0 6px}
  .htitle{font-weight:900;font-size:clamp(18px,4.8vw,26px);letter-spacing:.02em}
  .htitle small{display:block;font-weight:700;font-size:11px;letter-spacing:.26em;color:var(--gold);margin-bottom:2px}
  .lock{display:flex;align-items:center;gap:9px}
  .lock .tr{height:54px;width:auto;display:block;filter:drop-shadow(0 2px 8px rgba(0,0,0,.45))}
  /* accent bar */
  .stripe{height:4px;border-radius:99px;margin:10px 0 4px;
    background:linear-gradient(90deg,var(--lime),var(--blue) 36%,var(--violetL) 66%,var(--pink));
    box-shadow:0 0 16px rgba(167,139,250,.30)}

  nav{display:flex;gap:5px;flex-wrap:wrap;position:sticky;top:0;z-index:20;padding:10px 0;
    background:linear-gradient(180deg,var(--bg) 72%,rgba(10,10,16,0));margin-bottom:6px}
  nav button{font-family:inherit;font-weight:600;font-size:13px;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:8px 13px;cursor:pointer;transition:color .15s,background .15s}
  nav button:hover{color:var(--tx);background:var(--panel2)}
  nav button.on{color:#0a0a10;background:var(--lime);border-color:transparent;font-weight:700}

  .view{display:none;animation:fade .25s both}.view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

  .barh{display:flex;align-items:baseline;gap:12px;color:var(--tx);font-family:"Anton",sans-serif;font-weight:400;
    font-size:clamp(24px,5vw,34px);line-height:.95;letter-spacing:.01em;margin:26px 0 14px;padding:0}
  .barh .en{margin-left:auto;font-family:"Space Grotesk",sans-serif;font-weight:700;letter-spacing:.18em;font-size:11px;text-transform:uppercase;color:var(--violetL);align-self:center}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;margin:12px 0}
  .gcard,.dg,.pf-item{border-radius:18px}
  .hint{color:var(--muted);font-size:12.5px;margin:4px 0 10px}
  h2.sec{font-weight:900;font-size:15px;margin:4px 0}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:9px 7px;text-align:center;border-bottom:1px solid var(--line)}
  th{color:var(--gold);font-weight:700;font-size:12px}
  td.l,th.l{text-align:left}
  tr:last-child td{border-bottom:0}

  /* leaderboard */
  .lb .pl{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:15px;margin:8px 0;background:var(--panel);
    border:1px solid var(--line);border-left:5px solid var(--pc,var(--lime))}
  .lb .pl.r1{background:linear-gradient(100deg,rgba(124,58,237,.30),rgba(255,61,129,.14));border-color:transparent}
  .ranknum{font-family:"Anton",sans-serif;font-size:24px;width:30px;text-align:center;color:var(--muted)}
  .r1 .ranknum{color:transparent;background:linear-gradient(180deg,var(--g-hi),var(--g-lo));-webkit-background-clip:text;background-clip:text}
  .pmid{flex:1;min-width:0}
  .pname{font-weight:900;font-size:16px}
  .pbar{height:7px;border-radius:5px;background:var(--pc,#a78bfa);margin-top:5px;min-width:3px;transition:width .4s}
  .bd{font-size:11px;color:var(--muted);margin-top:3px}
  .bd .lb-played{color:var(--gold);font-weight:700}
  .ptotal{font-family:"Anton",sans-serif;font-size:26px;flex:none}
  .lb-item{margin:8px 0}
  .lb-item .pl{margin:0;width:100%}
  .pl.click{cursor:pointer}
  .lb-caret{flex:none;color:var(--gold);font-size:12px;width:14px;text-align:center;align-self:center}
  .lb-detail{margin-top:3px}
  .lb-detail-in{background:var(--row);border:1px solid var(--line);border-radius:12px;padding:6px 12px 9px}
  .lbd-r{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 1px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .lbd-r:last-of-type{border-bottom:0}
  .lbd-team{font-weight:700;display:flex;align-items:center;gap:5px}
  .lbd-mid{color:var(--muted);flex:1;min-width:70px}
  .lbd-tag{font-size:9.5px;font-weight:900;border-radius:5px;padding:1px 6px;flex:none}
  .lbd-tag.w{background:rgba(198,255,0,.16);color:var(--lime)}
  .lbd-tag.d{background:rgba(255,255,255,.1);color:var(--muted)}
  .lbd-tag.gk{background:var(--orange);color:#241404}
  .lbd-tag.b{background:rgba(167,139,250,.2);color:var(--violetL)}
  .lbd-tag.k{background:rgba(0,212,255,.16);color:var(--blue)}
  .lbd-tag.l{background:rgba(255,61,129,.16);color:var(--pink)}
  .lbd-tag.bet{background:rgba(255,214,10,.16);color:#ffd60a}
  .lbd-pt{font-family:"Anton",sans-serif;font-size:15px;color:var(--lime);flex:none;width:40px;text-align:right}
  .lbd-pt.neg{color:var(--pink)}
  .lbd-tot{text-align:right;font-size:12px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
  .lbd-tot b{font-family:"Anton",sans-serif;font-size:16px;color:var(--tx);margin:0 2px}

  /* draft under leaderboard */
  .draftgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .dg{background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .dg .gh{background:linear-gradient(90deg,var(--violet),var(--pink));color:#fff;font-family:"Anton",sans-serif;font-weight:400;padding:8px 13px;font-size:15px;letter-spacing:.02em}
  .drow{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--line);font-size:13px}
  .drow:last-child{border-bottom:0}
  .drow .fn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .drow select{font-size:12px;padding:4px 6px;max-width:96px}

  /* group standings */
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .gcard .tbw{overflow-x:auto}
  .gcard .gh{background:linear-gradient(90deg,var(--violet),var(--pink));color:#fff;font-family:"Anton",sans-serif;font-weight:400;padding:9px 13px;display:flex;justify-content:space-between;align-items:center;font-size:16px}
  .gcard table{font-size:12.5px}.gcard th,.gcard td{padding:7px 5px}
  .gcard td.l{text-align:left;font-weight:700}
  .ochip{display:inline-block;font-size:10px;font-weight:900;color:#1a160f;border-radius:5px;padding:1px 6px;margin-left:5px}
  .flag{width:22px;height:15px;border-radius:2px;object-fit:contain;vertical-align:-3px;box-shadow:0 0 0 1px rgba(0,0,0,.25);flex:none;background:rgba(255,255,255,.06)}
  /* knockout bracket */
  .bk-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:11px;background:var(--row);border:1px solid var(--line);margin:7px 0}
  .bk-mno{font-family:"Anton",sans-serif;font-size:13px;color:var(--gold);min-width:36px;flex:none;text-align:center}
  .bk-sides{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
  .bk-side{display:flex;align-items:center;gap:7px;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bk-slot{color:var(--gold);font-size:10px;font-weight:700;border:1px solid var(--line);border-radius:5px;padding:1px 6px;flex:none;background:rgba(167,139,250,.08)}
  .bk-when{font-size:10px;color:var(--muted);width:74px;flex:none;text-align:right;line-height:1.3}
  .bk-tbd{color:var(--muted);font-size:12px}
  .bk-flow{display:flex;align-items:center;gap:10px;padding:6px 2px;border-bottom:1px solid var(--line)}
  .bk-flow:last-child{border-bottom:0}
  .bk-feed{font-size:13.5px;font-weight:700}
  .bk-feed em{color:var(--muted);font-weight:400;font-style:normal;margin:0 5px}
  /* トーナメント・ブラケット（横スクロール／接続線つき） */
  .tb-legend{display:flex;flex-wrap:wrap;gap:6px 13px;margin:8px 0 4px;font-size:11px;color:var(--muted)}
  .tb-key{display:inline-flex;align-items:center;gap:5px}
  .tb-dotk{width:10px;height:10px;border-radius:3px;display:inline-block;flex:none}
  .tb-champ{display:flex;align-items:center;gap:10px;margin:8px 0;padding:11px 14px;border-radius:13px;background:linear-gradient(110deg,rgba(212,175,124,.16),rgba(167,139,250,.08));border:1px solid var(--g-mid)}
  .tb-champ .ttl{font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
  .tb-champ .nm{font-family:"Anton",sans-serif;font-size:21px;letter-spacing:.01em}
  .tb-champ .flag{width:30px;height:21px}
  .tb-scrollhint{font-size:10.5px;color:var(--muted);text-align:right;margin:2px 2px 0}
  .tb-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.018),transparent)}
  .tb-canvas{position:relative}
  .tb-links{position:absolute;left:0;top:0;pointer-events:none}
  .tb-hd{position:absolute;top:7px;font-family:"Anton",sans-serif;font-size:12.5px;letter-spacing:.05em;color:var(--gold);text-align:center}
  .tb-hd em{display:block;font-family:inherit;font-style:normal;font-size:8px;color:var(--muted);letter-spacing:.13em;margin-top:1px}
  .tb-box{position:absolute;background:var(--row);border:1px solid var(--line);border-radius:9px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.28)}
  .tb-box.win{border-color:var(--g-mid)}
  .tb-slot{display:flex;align-items:center;gap:5px;padding:5px 7px;font-size:12.5px;white-space:nowrap;overflow:hidden;border-bottom:1px solid var(--line);min-height:27px}
  .tb-slot:last-of-type{border-bottom:0}
  .tb-slot .flag{flex:none;width:20px;height:14px}
  .tb-tag{flex:none;font-size:8.5px;font-weight:800;color:var(--gold);background:rgba(212,175,124,.12);border-radius:4px;padding:1px 4px;min-width:20px;text-align:center}
  .tb-nm{overflow:hidden;text-overflow:ellipsis;font-weight:600}
  .tb-slot.adv .tb-nm{color:var(--g-hi);font-weight:800}
  .tb-slot.muted .tb-nm{color:var(--muted);font-weight:600}
  .tb-slot.tbd .tb-nm{color:var(--muted);opacity:.55}
  .tb-bdg{margin-left:auto;flex:none;font-size:8px;font-weight:800;border-radius:4px;padding:1px 4px;letter-spacing:.02em}
  .tb-bdg.proj{background:rgba(167,139,250,.16);color:#cbbcff;border:1px solid rgba(167,139,250,.32)}
  .tb-slot.adv .tb-av{margin-left:auto;color:var(--gold);font-size:9px;flex:none}
  .tb-slot.adv .tb-bdg{margin-left:6px}
  .tb-slot.act .tb-nm{color:#9fe0b0;font-weight:800}
  .tb-slot .tb-av.act{color:#9fe0b0;font-size:11px}
  .tb-box.act{border-color:#3a7d52}
  .tb-champ.act{background:linear-gradient(110deg,rgba(120,200,140,.2),rgba(212,175,124,.1));border-color:#5fae7a}
  .tb-meta{padding:4px 8px;background:rgba(0,0,0,.24);border-top:1px solid var(--line);line-height:1.3}
  .tb-meta .tb-d{display:block;font-size:10.5px;color:var(--muted)}
  .tb-meta .tb-d b{color:var(--gold);font-weight:800}
  .tb-meta .tb-d i{font-style:normal;opacity:.55;margin-left:4px;font-size:9px}
  .tb-meta .tb-v{display:block;font-size:9.5px;color:var(--tx);white-space:normal;word-break:break-word;margin-top:1px}
  .tb-meta .tb-v.dim{color:var(--muted)}
  .tb-meta .tb-jst{font-size:7.5px;font-weight:800;color:#0a0a10;background:var(--g-mid);border-radius:3px;padding:0 3px;margin-left:4px;vertical-align:1px}
  .tb-meta .tb-loc{font-size:7.5px;color:var(--muted);margin-left:4px}
  /* 決勝T日程（日程タブ） */
  .ko-m{display:flex;align-items:center;gap:9px;padding:8px 8px;border-bottom:1px solid var(--line)}
  .ko-no{font-family:"Anton",sans-serif;font-size:13px;color:var(--gold);min-width:34px;flex:none}
  .ko-tm{flex:1;min-width:0;font-size:13.5px;font-weight:600;display:flex;flex-wrap:wrap;align-items:center;gap:4px}
  .ko-tm i{font-style:normal;color:var(--muted);font-size:11px;margin:0 3px}
  .ko-ven{flex:none;width:96px;text-align:right;font-size:10.5px;color:var(--tx);line-height:1.3}
  .ko-ven em{font-style:normal;color:var(--muted);font-size:9px}
  .ko-proj{font-size:9px;font-weight:800;color:#cbbcff;background:rgba(167,139,250,.16);border:1px solid rgba(167,139,250,.32);border-radius:4px;padding:1px 4px;margin-left:4px}
  .ko-rounds{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
  .ko-round{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
  .ko-round b{font-size:13.5px}
  .ko-round span{font-size:12px;color:var(--gold);font-weight:700}
  @media(max-width:420px){.ko-ven{width:78px}.ko-rounds{grid-template-columns:1fr}}
  /* fifa ranking */
  .rk{font-family:"Anton",sans-serif;font-size:16px;color:var(--gold);width:56px}
  /* strength index */
  .si-item{margin:6px 0}
  .si-row{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 10px}
  .si-row.click{cursor:pointer}
  .si-rank{font-family:"Anton",sans-serif;font-size:15px;color:var(--muted);width:20px;text-align:center;flex:none}
  .si-nm{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 1 auto;min-width:0}
  .si-barwrap{flex:1 1 40px;height:9px;border-radius:6px;background:var(--row);overflow:hidden;min-width:24px;margin-left:2px}
  .si-bar{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--lime))}
  .si-score{font-family:"Anton",sans-serif;font-size:19px;flex:none;width:30px;text-align:right}
  .si-caret{flex:none;color:var(--gold);font-size:12px;width:14px;text-align:center}
  .si-det{margin:3px 0 0}
  .si-detin{background:var(--row);border:1px solid var(--line);border-radius:11px;padding:9px 12px}
  .si-sub{display:flex;align-items:center;gap:8px;font-size:11.5px;margin:3px 0}
  .si-sl{color:var(--muted);width:118px;flex:none}
  .si-sbar{flex:1;height:7px;border-radius:5px;background:var(--card);overflow:hidden}
  .si-sbar i{display:block;height:100%}
  .si-sv{font-family:"Anton",sans-serif;font-size:13px;width:26px;text-align:right;flex:none}
  .si-host{font-size:11px;color:var(--orange);font-weight:700;margin:4px 0 2px}
  .so-item{border-bottom:1px solid var(--line)}
  .so-item:last-child{border-bottom:0}
  .so-row{display:flex;align-items:center;gap:8px;padding:7px 2px}
  .so-row.click{cursor:pointer}
  .so-rank{font-family:"Anton",sans-serif;font-size:15px;color:var(--muted);width:16px;text-align:center;flex:none}
  .so-dot{width:11px;height:11px;border-radius:50%;flex:none}
  .so-nm{font-weight:900;font-size:14px;width:36px;flex:none}
  .so-bar{flex:1 1 30px;height:8px;border-radius:5px;background:var(--row);overflow:hidden;min-width:20px}
  .so-bar i{display:block;height:100%}
  .so-sum{font-family:"Anton",sans-serif;font-size:19px;flex:none;width:42px;text-align:right}
  .so-avg{font-size:10.5px;color:var(--muted);flex:none;width:48px;text-align:right}
  .so-caret{flex:none;color:var(--gold);font-size:12px;width:13px;text-align:center}
  .so-det{padding:2px 0 8px}
  .so-cty{display:flex;align-items:center;gap:6px;font-size:12.5px;padding:4px 8px;border-bottom:1px solid var(--line)}
  .so-cty:last-child{border-bottom:0}
  .so-cf{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
  .so-cd{font-family:"Anton",sans-serif;font-size:15px;color:var(--lime);flex:none;width:28px;text-align:right}
  .si-raw{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.7}
  .si-raw b{color:var(--tx);font-weight:700}
  /* pitch */
  .pitch{position:relative;width:100%;aspect-ratio:7/10;border:1px solid rgba(255,255,255,.22);border-radius:9px;overflow:hidden;
    background:repeating-linear-gradient(0deg,#15441f 0 11%,#103418 11% 22%);box-shadow:inset 0 0 26px rgba(0,0,0,.4)}
  .pitch::before{content:"";position:absolute;inset:5px;border:1px solid rgba(255,255,255,.22);border-radius:3px}
  /* named XI player markers (half-court, portfolio) */
  .pp{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;width:60px;pointer-events:none}
  .pp .dot{width:13px;height:13px;border-radius:50%;box-shadow:0 0 0 2px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.6)}
  .pp .nm{font-size:9px;line-height:1.05;text-align:center;color:#fff;text-shadow:0 1px 2px #000,0 0 4px #000;max-width:62px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* half-court (single team formation, portfolio) */
  .pitch.half{aspect-ratio:3/4;max-width:300px;margin:0 auto}
  .pitch.half .pp{width:46px}
  .pitch.half .nm{max-width:48px;font-size:8.5px}
  .pitch.half .hpline{position:absolute;left:5px;right:5px;top:5px;height:1.5px;background:rgba(255,255,255,.28)}
  .pitch.half .hpcirc{position:absolute;left:50%;top:4px;width:32%;aspect-ratio:2/1;transform:translateX(-50%);border:1.5px solid rgba(255,255,255,.26);border-top:0;border-radius:0 0 999px 999px}
  .pitch.half .hpbox{position:absolute;left:50%;bottom:5px;width:52%;height:14%;transform:translateX(-50%);border:1.5px solid rgba(255,255,255,.2);border-bottom:0;border-radius:3px 3px 0 0}
  /* team detail (in portfolio) */
  .td-top{margin:6px 0 12px}
  .td-pitch{text-align:center}
  .td-form{font-family:"Anton",sans-serif;font-size:17px;color:var(--gold);margin-top:6px}
  .td-sub2{font-size:10px;color:var(--muted);letter-spacing:.12em}
  .td-info{min-width:0}
  .td-mgr{font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .td-lbl{font-size:10px;font-weight:900;color:#241c0c;background:linear-gradient(180deg,var(--g-hi),var(--g-lo));border-radius:5px;padding:1px 6px}
  .td-nat{font-size:11px;color:var(--muted)}
  .td-tac{font-size:12.5px;line-height:1.75;color:var(--tx)}
  .td-src{font-size:10px;color:var(--muted);margin-top:6px}

  /* portfolio */
  .pf-summary{display:flex;align-items:center;gap:14px;background:var(--row);border:1px solid var(--line);border-left:5px solid var(--pc,#a78bfa);border-radius:12px;padding:12px 16px;margin:10px 0}

  .pf-item{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:8px 0;overflow:hidden}

  .pf-pts{font-family:"Anton",sans-serif;font-size:20px;flex:none}

  .pf-caret{flex:none;color:var(--gold);font-size:13px;width:16px;text-align:center}
  .pf-sub{font-size:11.5px;color:var(--muted);padding:0 13px 4px 13px}

  table.sqt{width:100%;border-collapse:collapse;font-size:12px}

  .sqgrp{font-size:10px;font-weight:900;color:var(--gold);letter-spacing:.1em;padding:8px 5px 2px}

  .tchip.tB{background:var(--blue);color:#06121a}
  .tchip.tC{background:var(--violetL);color:#1a0f3a}
  .tchip.tD{background:var(--orange);color:#241404}
  .tchip.tX{background:rgba(255,255,255,.12);color:var(--muted)}
  .gcard tr.adv td{background:rgba(167,139,250,.10)}

  /* schedule / scores */
  .day{font-weight:900;font-size:13px;color:var(--gold);margin:16px 0 6px;display:flex;align-items:center;gap:8px}

  .m .gg{font-size:10px;font-weight:900;color:#241c0c;background:linear-gradient(180deg,var(--g-hi),var(--g-lo));border-radius:5px;padding:1px 5px;flex:none}

  .m .tn.aw{text-align:right}
  .m input{width:42px;text-align:center;font-size:15px;padding:6px 2px}

  input,select{font-family:inherit;color:var(--tx);background:#141330;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:14px}
  input[type=number]{-moz-appearance:textfield}

  .btn{font-family:inherit;font-weight:700;cursor:pointer;border:0;border-radius:11px;padding:10px 16px;font-size:13px;color:#0a0a10;background:var(--lime)}
  .btn.ghost{background:transparent;color:var(--lime);border:1px solid var(--lime)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .del{color:#e08a6a;background:transparent;border:1px solid rgba(224,138,106,.4);border-radius:8px;cursor:pointer;padding:4px 9px;font-size:12px}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:7px 0}

  .note{font-size:12.5px;color:var(--muted);background:var(--row);border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin:10px 0}

  /* recap (matchday review) */
  .rc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
  .rc-stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
  .rc-sv{font-family:"Anton",sans-serif;font-size:23px;color:var(--lime);line-height:1}
  .rc-sl{font-size:10px;color:var(--muted);letter-spacing:.06em;margin-top:4px}
  .rc-mem{display:flex;align-items:center;gap:9px;padding:7px 2px;border-bottom:1px solid var(--line)}

  .rc-mrank{font-family:"Anton",sans-serif;font-size:16px;color:var(--muted);width:16px;text-align:center;flex:none}
  .rc-mdot{width:11px;height:11px;border-radius:50%;flex:none}
  .rc-mnm{font-weight:900;font-size:14px;width:40px;flex:none}

  .rc-edh{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}

  .rc-tag.goal{background:var(--pink);color:#fff}.rc-ed.goal{border-left-color:var(--pink)}
  .rc-tag.draw{background:var(--violetL);color:#1a0f3a}.rc-ed.draw{border-left-color:var(--violetL)}

  .rc-grps{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:8px}
  .rc-grp{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 11px}
  .rc-gh{font-family:"Anton",sans-serif;color:var(--gold);font-size:14px;display:block;margin-bottom:5px}
  .rc-gres{display:flex;flex-direction:column;gap:4px;font-size:12px}
  .rc-gres span{display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rc-gres b{color:var(--lime);font-family:"Anton",sans-serif;font-size:13px;margin:0 3px;flex:none}
  .rc-tabs{display:flex;gap:6px;margin:4px 0 2px}
  .rc-tabs button{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-weight:800;font-size:13.5px;padding:9px 6px;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.02em}
  .rc-tabs button .en{font-size:9.5px;color:var(--muted);display:block;font-weight:700;letter-spacing:.08em;margin-top:1px}
  .rc-tabs button.on{background:linear-gradient(180deg,var(--g-mid),var(--g-lo));border-color:var(--g-hi);color:#15110a}
  .rc-tabs button.on .en{color:#3a2f12}
  @media(max-width:480px){.rc-stats{grid-template-columns:repeat(2,1fr)}}
  .badge{width:26px;height:20px;border-radius:5px;display:inline-grid;place-items:center;font-family:"Anton",sans-serif;font-size:13px;color:#241c0c;background:linear-gradient(180deg,var(--g-hi),var(--g-lo))}
  .rl-stage{background:linear-gradient(180deg,#191636,#0f0d24);border:2px solid var(--gold-soft);border-radius:16px;height:160px;display:grid;place-items:center;margin:12px 0;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.6),0 0 30px rgba(139,92,246,.25)}

  .rl-pill{display:inline-block;border:1px solid;border-radius:999px;padding:2px 11px;font-size:12px;font-weight:700;margin:2px}

  .rl-rank{font-family:"Anton",sans-serif;font-size:22px;width:30px;text-align:center;color:var(--gold)}
  .rl-dot{width:14px;height:14px;border-radius:50%;flex:none}
  .rl-nm{font-weight:900;font-size:17px}
  .rl-item.cur{background:rgba(167,139,250,.08);border-radius:8px}
  .rl-pts{margin-left:auto;font-size:12px;color:var(--muted);font-weight:700;flex:none}

  .rl-lk .flag{width:20px;height:14px}
  /* home bento */
  .bento{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:2px 0 8px}
  .bx{border-radius:18px;padding:16px;position:relative;overflow:hidden;min-height:104px;display:flex;flex-direction:column}

  .bx.lime{background:var(--lime);color:#0a0a10}.bx.pink{background:var(--pink);color:#fff}.bx.blue{background:var(--blue);color:#06121a}.bx.orange{background:var(--orange);color:#0a0a10}

  .bx-h{font-family:"Anton",sans-serif;font-size:clamp(26px,5.5vw,42px);line-height:.88;margin:auto 0 8px;font-weight:400}
  .bx-v{font-family:"Anton",sans-serif;font-size:38px;line-height:.95;margin-top:7px;font-weight:400}

  .bx-lead{font-size:12px;margin-top:2px}.bx-lead b{background:var(--lime);color:#3b1473;padding:2px 9px;border-radius:99px;font-weight:700}
  @media(max-width:640px){.bento{grid-template-columns:repeat(2,1fr)}.bx.hero{grid-column:span 2;grid-row:span 1;min-height:130px}}
  /* home */

  .hm-rmtop{display:flex;align-items:center;gap:8px}

  .hm-rmtop .hm-tn{flex:1;min-width:0;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
  .hm-rmtop .hm-tn.aw{justify-content:flex-end}
  .hm-score{font-family:"Anton",sans-serif;font-size:22px;flex:none;padding:0 8px}

  .hm-play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.55);border:2px solid #fff;color:#fff;display:grid;place-items:center;font-size:17px;padding-left:3px}

  .hm-empty{color:var(--muted);font-size:13px;background:var(--row);border:1px dashed var(--line);border-radius:10px;padding:14px;text-align:center}
  /* japan news */
  .nws-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .nws{display:flex;flex-direction:column;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px;text-decoration:none;color:var(--tx);transition:border-color .15s,background .15s}

  /* video modal */
  .modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);align-items:center;justify-content:center;padding:16px}

  /* match detail (scores tab) */

  .st-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-top:7px}

  .st-pl{display:flex;align-items:center;gap:5px;font-size:11.5px;padding:2px 0}

function tbDev(n){const s=G.strength&&G.strength.teams&&G.strength.teams[n];return (s&&s.dev)||(100-(FIFA_RANK[n]||90));}
// 各グループの最終順位を予測（消化済みは実結果、未消化は偏差値で勝敗を補完）＋3位枠の割当。
function tbProject(){
  const groups={};
  'ABCDEFGHIJKL'.split('').forEach(g=>{
    const ms=G.gsMatches.filter(m=>m.group===g);
    const t={};const add=n=>{t[n]=t[n]||{team:n,pts:0,gd:0,gf:0};return t[n];};
    let complete=true;
    ms.forEach(m=>{const H=add(m.home),A=add(m.away);let hs=m.hs,as=m.as;
      if(hs==null||as==null){complete=false;const d=tbDev(m.home)-tbDev(m.away);
        if(Math.abs(d)<3){hs=1;as=1;}else{const mg=Math.min(3,1+Math.floor(Math.abs(d)/4));if(d>0){hs=mg;as=0;}else{hs=0;as=mg;}}}
      H.gf+=hs;A.gf+=as;H.gd+=hs-as;A.gd+=as-hs;
      if(hs>as)H.pts+=3;else if(as>hs)A.pts+=3;else{H.pts++;A.pts++;}});
    groups[g]={rows:Object.values(t).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf),complete};
  });

  const thirds=Object.keys(groups).map(g=>Object.assign({g},groups[g].rows[2])).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const Q=thirds.slice(0,8).map(x=>x.g);

  const assign={};
  // GS確定後は公式の割り当て表（KO_THIRD）を使用。未確定時のみ偏差値予測用に許容集合で総当たり割り当て。
  const officialOk=done&&slots.every(s=>{const g=KO_THIRD[parseInt(s.key,10)];return g&&Q.includes(g)&&s.allowed.includes(g);});
  if(officialOk){slots.forEach(s=>{assign[s.key]=KO_THIRD[parseInt(s.key,10)];});}
  else{(function bt(i,used){if(i===slots.length)return true;for(const g of slots[i].allowed){if(Q.includes(g)&&!used[g]){used[g]=1;assign[slots[i].key]=g;if(bt(i+1,used))return true;used[g]=0;delete assign[slots[i].key];}}return false;})(0,{});}
  return {groups,Q,assign,done};
}

function nextMatch(n){
  const ms=G.gsMatches.filter(m=>m.home===n||m.away===n).map(m=>({
    ...m,t:new Date(`${m.date}T${m.time}:00+09:00`).getTime(),
    opp:m.home===n?m.away:m.home,isHome:m.home===n,played:m.hs!=null&&m.as!=null
  })).sort((a,b)=>a.t-b.t);
  if(!ms.length)return null;
  const now=Date.now();
  return ms.find(x=>x.t>=now)||ms[ms.length-1];
}

// 成績→点数（少ないほど良い）。確定=最終結果、未確定=現在地の暫定点（その時点で敗退した場合の最悪値）。
const PLACE_PTS={champion:1,runnerup:2,third:3,fourth:4,qf:8,r16:12,r32:16,gs:20};
const REACH={champion:8,runnerup:7,third:6,fourth:5,qf:4,r16:3,r32:2,gs:1};
function teamResult(t){
  const ko=G.koMatches||[];const find=r=>ko.find(m=>m.round===r&&(m.home===t||m.away===t));
  const F=find('F'); if(F&&F.winner)return F.winner===t?{pts:1,reach:8,label:'優勝',done:true}:{pts:2,reach:7,label:'準優勝',done:true};
  const T=find('3rd'); if(T&&T.winner)return T.winner===t?{pts:3,reach:6,label:'3位',done:true}:{pts:4,reach:5,label:'4位',done:true};
  const SF=find('SF'); if(SF&&SF.winner&&SF.winner!==t)return {pts:4,reach:5,label:'3位決定戦へ',done:false};
  if((SF&&SF.winner===t)||(F&&!F.winner&&(F.home===t||F.away===t)))return {pts:2,reach:7,label:'決勝進出',done:false};
  const QF=find('QF'); if(QF&&QF.winner&&QF.winner!==t)return {pts:8,reach:4,label:'ベスト8敗退',done:true};
  if(QF&&QF.winner===t)return {pts:4,reach:5,label:'ベスト4進出',done:false};
  const R16=find('R16'); if(R16&&R16.winner&&R16.winner!==t)return {pts:12,reach:3,label:'ベスト16敗退',done:true};
  if(R16&&R16.winner===t)return {pts:8,reach:4,label:'ベスト8進出',done:false};
  const R32=find('R32'); if(R32&&R32.winner&&R32.winner!==t)return {pts:16,reach:2,label:'ベスト32敗退',done:true};
  if(R32&&R32.winner===t)return {pts:12,reach:3,label:'ベスト16進出',done:false};
  if(tbSurvivors().includes(t))return {pts:16,reach:2,label:'決勝T進出',done:false};
  return {pts:20,reach:1,label:'グループ敗退',done:true};
}
// 同点比較: 合計が同じなら、勝ち上がりが上のチームを持つ方が上位（reach降順で辞書式比較）。低いtotalが上位。
function cmpPlayer(a,b){if(a.total!==b.total)return a.total-b.total;
  for(let i=0;i<Math.max(a.reaches.length,b.reaches.length);i++){const x=a.reaches[i]||0,y=b.reaches[i]||0;if(x!==y)return y-x;}return 0;}
function compute(){
  // グループ順位（流用）
  const gr=groupsOf();const standings={};
  for(const grp of Object.keys(gr).sort()){
    const st={};gr[grp].forEach(t=>st[t]={team:t,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0});
    const ms=G.gsMatches.filter(m=>m.group===grp);let played=0;
    ms.forEach(m=>{if(m.hs==null||m.as==null)return;played++;const h=st[m.home],a=st[m.away];
      h.P++;a.P++;h.GF+=m.hs;h.GA+=m.as;a.GF+=m.as;a.GA+=m.hs;
      if(m.hs===m.as){h.D++;a.D++;h.Pts++;a.Pts++;}
      else if(m.hs>m.as){h.W++;a.L++;h.Pts+=3;}else{a.W++;h.L++;a.Pts+=3;}});
    Object.values(st).forEach(s=>s.GD=s.GF-s.GA);
    const arr=Object.values(st).sort((x,y)=>y.Pts-x.Pts||y.GD-x.GD||y.GF-x.GF);
    standings[grp]={rows:arr,complete:played===ms.length&&played>0};
  }
  const F=(G.koMatches||[]).find(m=>m.round==='F'&&m.winner);
  const champion=F?F.winner:null, runner=F?(F.home===champion?F.away:F.home):null;
  const P={};
  G.players.forEach(p=>{
    const ts=Object.keys(G.teams).filter(t=>owner(t)===p).map(t=>({team:t,...teamResult(t)}))
      .sort((x,y)=>y.reach-x.reach||x.pts-y.pts);
    const base=ts.reduce((s,r)=>s+r.pts,0);
    const pr=(G.predict||{})[p]||{};let bonus=0;const hit=[];
    if(champion&&pr.champ===champion){bonus-=5;hit.push('優勝的中 −5');}
    if(runner&&pr.runnerup===runner){bonus-=3;hit.push('準優勝的中 −3');}
    P[p]={teams:ts,base,bonus,hit,total:base+bonus,reaches:ts.map(r=>r.reach).sort((a,b)=>b-a),predict:pr};
  });
  return {P,standings,champion,runner};
}

// 決勝トーナメントの結果（ベスト16以降）をラウンド別に表示。R32は上の前日/本日/翌日で日付順に出る。
function koResultsHTML(){
  const RL={R16:'ベスト16',QF:'準々決勝',SF:'準決勝','3rd':'3位決定戦',F:'決勝'};
  const ord={F:6,SF:5,'3rd':4,QF:3,R16:2};
  const played=(G.koMatches||[]).filter(m=>m.winner&&m.round!=='R32'&&ord[m.round]);
  if(!played.length)return '';
  const cards=m=>{const key=m.home+'|'+m.away,s=G.stats&&G.stats[key];let hs=null,as=null,pens=null,scorers=[];
    if(s){hs=0;as=0;(s.goals||[]).forEach(g=>{if(g.team===m.home)hs++;else if(g.team===m.away)as++;});pens=s.pens||null;scorers=(s.goals||[]).map(g=>({player:g.player,minute:g.minute,team:g.team}));}
    return resultCard({koKey:key,home:m.home,away:m.away,hs,as,pens,scorers,winner:m.winner});};
  const byR={};played.forEach(m=>{(byR[m.round]=byR[m.round]||[]).push(m);});
  return Object.keys(byR).sort((a,b)=>ord[b]-ord[a]).map(r=>`<div class="barh">${RL[r]} 結果 <span class="en">${r}</span></div>${byR[r].map(cards).join('')}`).join('');
}

function oddsRow(key){
  const o=G.odds&&G.odds[key];
  if(!o||o.h==null)return '';
  const inv=x=>x>0?1/x:0;const ih=inv(o.h),id=inv(o.d),ia=inv(o.a),s=ih+id+ia||1;
  const ph=Math.round(ih/s*100),pd=Math.round(id/s*100),pa=Math.max(0,100-ph-pd);
  const f=x=>x==null?'—':Number(x).toFixed(2);
  return `<div class="odds">
    <span class="oddbar"><i style="width:${ph}%;background:var(--lime)"></i><i style="width:${pd}%;background:#7d7568"></i><i style="width:${pa}%;background:var(--pink)"></i></span>
    <span class="od win"><b>${f(o.h)}</b><i>勝</i></span>
    <span class="od"><b>${f(o.d)}</b><i>分</i></span>
    <span class="od lose"><b>${f(o.a)}</b><i>負</i></span>
    <span class="olabel">ODDS</span></div>`;
}
function togMatch(key,pfx){pfx=pfx||'';
  const el=document.getElementById('md-'+pfx+key),bt=document.getElementById('mx-'+pfx+key);

function ratC(r){r=Number(r);return r>=7.5?'rh':r>=6.5?'rm':'rl';}
// スタメンを横長フィールドに配置（Sofascore風：ホーム左/アウェイ右、レーティング付き）
function lpNorm(lu){if(!lu)return{players:[]};if(Array.isArray(lu))return{players:lu};return{formation:lu.formation,players:lu.players||[]};}
function lpSide(lu,side,color){
  const ps=lpNorm(lu).players;const byRow={};
  ps.forEach(p=>{let r,c=null;
    if(p.grid){const g=String(p.grid).split(':');r=+g[0]||1;c=+g[1]||1;}
    else {const o={GK:1,G:1,DF:2,D:2,MF:3,M:3,FW:4,F:4};r=o[p.pos]||3;}
    (byRow[r]=byRow[r]||[]).push(Object.assign({},p,{_c:c}));});
  const rows=Object.keys(byRow).map(Number).sort((a,b)=>a-b);const n=rows.length;let out='';
  rows.forEach((r,ri)=>{
    const band=byRow[r].slice().sort((a,b)=>(a._c||0)-(b._c||0));
    const frac=n>1?ri/(n-1):0;const x=side==='home'?(4+frac*40):(96-frac*40);
    band.forEach((p,j)=>{const y=7+(j+1)/(band.length+1)*86;
      const rt=p.rating?`<span class="lp-rt ${ratC(p.rating)}">${Number(p.rating).toFixed(1)}</span>`:'';
      const nm=esc(String(p.name||'').split(' ').pop());
      out+=`<span class="lp-p" style="left:${x}%;top:${y}%"><span class="lp-dot" style="background:${color}"></span>${rt}<span class="lp-nm">${nm}</span></span>`;});
  });
  return out;
}
function lineupPitch(home,away,hN,aN){
  const fH=lpNorm(home).formation,fA=lpNorm(away).formation;
  return `<div class="lp-team"><span class="lp-dotk" style="background:var(--c6)"></span>${esc(hN)}${fH?` <span class="lp-f">${esc(fH)}</span>`:''}<span style="flex:1"></span>${fA?`<span class="lp-f">${esc(fA)}</span> `:''}${esc(aN)}<span class="lp-dotk" style="background:var(--c1)"></span></div>
    <div class="lp-pitch dual"><span class="lp-mid"></span><span class="lp-circle"></span>${lpSide(home,'home','var(--c6)')}${lpSide(away,'away','var(--c1)')}</div>`;
}

    const hs=sl(s.subs.home,esc(m.home)),as=sl(s.subs.away,esc(m.away));if(hs||as)h+=`<div class="st-sub">選手交代</div><div class="st-xi">${hs}${as}</div>`;}

    <div class="card"><div class="row">
      <button class="btn" onclick="exportHTML()">⬇ 最新データでHTMLをダウンロード</button>
      <button class="btn ghost" onclick="copyJSON()">JSONをコピー</button></div><div class="row" style="margin-top:8px"><button class="btn ghost sm" onclick="saveConfig()">config.json を保存</button><button class="btn ghost sm" onclick="saveResults()">results.json を保存</button></div><p class="hint">自動更新セットでは、ドラフト後に <b>config.json</b>（保有者・色・ティア）をコミット。<b>results.json</b>（スコア）はGitHub Actionsが自動更新します。手動入力も引き続き可能です。</p>
      <p class="hint" style="margin-top:12px">手動編集する場合は下を書き換えて「読み込む」：</p>
      <textarea id="jsonbox">${esc(JSON.stringify(G,null,1))}</textarea>
      <div class="row"><button class="btn ghost sm" onclick="loadJSON()">JSONを読み込む</button><span id="loadmsg" class="hint"></span></div></div>
    <div class="note"><b>ウェブアプリ化：</b>このHTMLを <b>Netlify Drop</b>(netlify.com/drop にドラッグ) か <b>GitHub Pages</b> に置けば、全員が同じURLで閲覧可能。</div>`;
}

// 派生ビュー（結果・順位に依存）をまとめて再描画。編集中のタブ（設定/日程）は再生成しないので入力状態は保持される。
function refresh(){syncData();renderHome();renderLB();renderPortfolio();renderGroups();renderRecap();renderBracket();}
function setScore(id,s,v){const m=G.gsMatches.find(x=>x.id===id);if(!m)return;const val=v===''?null:Math.max(0,parseInt(v));if(s==='h')m.hs=val;else m.as=val;refresh();}
function addKO(){const r=ko_round.value,h=ko_home.value,a=ko_away.value,w=ko_win.value;if(!h||!a||h===a){alert('対戦カードを正しく選択してください');return;}G.koMatches.push({round:r,home:h,away:a,winner:w});renderAll();}
function delKO(i){G.koMatches.splice(i,1);renderAll();}
function setPlayer(i,v){const old=G.players[i];const nu=v.trim()||old;G.players[i]=nu;
  for(const t in G.teams)if(G.teams[t].owner===old)G.teams[t].owner=nu;
  if(G.colors[old]!==undefined){G.colors[nu]=G.colors[old];if(nu!==old)delete G.colors[old];}
  if(G.predict&&G.predict[old]!==undefined){G.predict[nu]=G.predict[old];if(nu!==old)delete G.predict[old];}
  renderAll();}
function setColor(p,v){G.colors[p]=v;refresh();}
function setOwner(t,v){G.teams[t].owner=v||null;refresh();}
function setPredict(p,kind,v){G.predict=G.predict||{};G.predict[p]=G.predict[p]||{champ:null,runnerup:null};G.predict[p][kind]=v||null;refresh();}
function copyJSON(){navigator.clipboard.writeText(JSON.stringify(G)).then(()=>alert('コピーしました'));}
function loadJSON(){try{G=JSON.parse(jsonbox.value);if(!G.colors)G.colors={};renderAll();loadmsg.textContent='✓ 読み込み完了';}catch(e){loadmsg.textContent='× JSONエラー';}}
function exportHTML(){syncData();const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  const blob=new Blob([html],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const d=new Date();a.href=url;a.download=`wc2026_dashboard_${d.getMonth()+1}${('0'+d.getDate()).slice(-2)}.html`;a.click();URL.revokeObjectURL(url);}

document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));document.getElementById('v-'+b.dataset.v).classList.add('on');});

async function boot(){
  try{
    const [c,r,od,sq,pf,rc]=await Promise.all([fetch('config.json',{cache:'no-store'}),fetch('results.json',{cache:'no-store'}),fetch('odds.json',{cache:'no-store'}).catch(()=>null),fetch('squads.json',{cache:'no-store'}).catch(()=>null),fetch('teams_profiles.json',{cache:'no-store'}).catch(()=>null),fetch('recent.json',{cache:'no-store'}).catch(()=>null)]);
    if(c.ok){const cfg=await c.json();if(cfg.players)G.players=cfg.players;if(cfg.colors)G.colors=cfg.colors;if(cfg.config)G.config=cfg.config;if(cfg.predict)G.predict=cfg.predict;if(cfg.teams)G.teams=cfg.teams;}
    if(r.ok){const res=await r.json();if(res.gsMatches)G.gsMatches=res.gsMatches;if(res.koMatches)G.koMatches=res.koMatches;}
    if(od&&od.ok){const o=await od.json();G.odds=o.odds||{};G.oddsUpdated=o.updated||null;}
    if(sq&&sq.ok){const s=await sq.json();G.squads=s.squads||{};G.squadsUpdated=s.updated||null;}
    if(pf&&pf.ok){const s=await pf.json();G.profiles=s.profiles||{};}
    if(rc&&rc.ok){const s=await rc.json();G.recent=s.recent||{};}
    const [hl,stt,nw,strg]=await Promise.all([fetch('highlights.json',{cache:'no-store'}).catch(()=>null),fetch('stats.json',{cache:'no-store'}).catch(()=>null),fetch('news.json',{cache:'no-store'}).catch(()=>null),fetch('strength.json',{cache:'no-store'}).catch(()=>null)]);
    if(hl&&hl.ok){const s=await hl.json();G.highlights=s.highlights||{};}
    if(stt&&stt.ok){const s=await stt.json();G.stats=s.stats||{};}
    if(nw&&nw.ok){const s=await nw.json();G.news=s;}
    if(strg&&strg.ok){G.strength=await strg.json();}
  }catch(e){/* file:// やオフライン時は埋め込みデータで動作 */}
  if(!G.colors)G.colors={};
  if(!G.odds)G.odds={};
  if(!G.squads)G.squads={};
  if(!G.profiles)G.profiles={};
  if(!G.recent)G.recent={};
  if(!G.highlights)G.highlights={};
  if(!G.stats)G.stats={};
  if(!G.news)G.news={items:[]};
  if(!G.strength)G.strength={teams:{},meta:{}};
  rlState.remaining=null;
  renderAll();
}
function dlJSON(name,obj){const b=new Blob([JSON.stringify(obj,null,1)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function saveConfig(){dlJSON('config.json',{players:G.players,colors:G.colors,config:G.config,predict:G.predict,teams:G.teams});}
function saveResults(){dlJSON('results.json',{gsMatches:G.gsMatches,koMatches:G.koMatches});}
boot();
</script>
</body>
